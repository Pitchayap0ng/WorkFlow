<!DOCTYPE html>
<html lang="th">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
        <title>IMS-Workflow Full System</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script
            src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
        <script
            src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
        <script
            src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
        <script
            src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="stylesheet" href="style.css">
    </head>
    <body class="bg-black text-white h-screen overflow-hidden">

        <div id="auth-ui"
            class="fixed inset-0 z-50 flex items-center justify-center bg-black/95 p-6 overflow-y-auto">
            <div class="w-full max-w-md my-auto text-center">
                <h1
                    class="text-4xl font-bold text-blue-500 mb-10 italic uppercase tracking-wider">IMS-WORKFLOW</h1>

                <div id="login-form" class="space-y-4 block">
                    <input type="text" id="l-id"
                        placeholder="Username หรือ Email"
                        class="time-pill w-full p-5 bg-zinc-900 border border-white/5 focus:outline-none focus:border-blue-500 transition-colors">
                    <input type="password" id="l-pw" placeholder="รหัสผ่าน"
                        class="time-pill w-full p-5 bg-zinc-900 border border-white/5 focus:outline-none focus:border-blue-500 transition-colors">
                    <button onclick="handleLogin()"
                        class="btn-primary w-full py-5 text-lg font-bold tracking-wide active:scale-[0.99] transition-transform">เข้าสู่ระบบ</button>
                    <p class="text-xs opacity-50 mt-4 uppercase">ยังไม่มีบัญชี?
                        <button onclick="toggleAuth('reg')"
                            class="text-blue-500 font-bold hover:underline">สมัครสมาชิก</button></p>
                </div>

                <div id="reg-form" class="hidden space-y-4">
                    <div id="reg-input-area" class="space-y-4">
                        <input type="text" id="r-name"
                            placeholder="ชื่อ-นามสกุล"
                            class="time-pill w-full p-4 bg-zinc-900 border border-white/5 focus:outline-none focus:border-blue-500">
                        <input type="text" id="r-user" placeholder="Username"
                            class="time-pill w-full p-4 bg-zinc-900 border border-white/5 focus:outline-none focus:border-blue-500">
                        <input type="email" id="r-email" placeholder="Email"
                            class="time-pill w-full p-4 bg-zinc-900 border border-white/5 focus:outline-none focus:border-blue-500">
                        <select id="r-job"
                            class="time-pill w-full p-4 bg-zinc-900 text-gray-400 border border-white/5 focus:outline-none focus:border-blue-500">
                            <option value="staff">Staff</option>
                            <option value="delivery">Delivery</option>
                        </select>
                        <input type="password" id="r-pw"
                            placeholder="รหัสผ่าน (6 ตัวขึ้นไป)"
                            class="time-pill w-full p-4 bg-zinc-900 border border-white/5 focus:outline-none focus:border-blue-500">
                        <button onclick="sendRegistrationOTP()"
                            class="btn-primary w-full py-4 bg-blue-600 font-bold active:scale-[0.99] transition-transform">ส่งรหัสยืนยันไปที่อีเมล</button>
                    </div>

                    <div id="reg-otp-area"
                        class="hidden space-y-4 pt-4 border-t border-white/10">
                        <input type="text" id="r-otp" placeholder="OTP CODE"
                            class="time-pill w-full p-4 text-center text-2xl tracking-[0.5em] bg-zinc-900 border border-green-500/30 focus:outline-none focus:border-green-500">
                        <button onclick="verifyAndRegister()"
                            class="btn-primary w-full py-4 bg-green-600 font-bold active:scale-[0.99] transition-transform">ยืนยันและสมัครสมาชิก</button>
                    </div>
                    <button onclick="toggleAuth('login')"
                        class="w-full text-[10px] opacity-40 uppercase mt-2 hover:text-white transition-colors">ยกเลิก</button>
                </div>
            </div>
        </div>

        <div id="app-ui" class="hidden h-full flex flex-col">
            <main class="flex-1 px-5 pt-12 overflow-y-auto pb-32">
                <div id="remote-banner"
                    class="hidden bg-orange-600 p-4 rounded-2xl mb-6 flex justify-between items-center shadow-lg">
                    <div><p
                            class="text-[9px] font-bold opacity-70 uppercase italic">Viewing
                            Mode</p><p class="font-bold text-lg"
                            id="remote-name">...</p></div>
                    <button onclick="exitAdminView()"
                        class="bg-white/20 px-4 py-2 rounded-xl text-xs font-bold">EXIT</button>
                </div>

                <section id="p-home" class="page active">
                    <div class="flex justify-between items-center mb-8">
                        <div><p
                                class="text-[10px] opacity-40 font-bold uppercase">Employee</p><h2
                                id="u-display"
                                class="text-2xl font-bold text-blue-400">...</h2></div>
                        <img id="u-photo" onclick="openProfileModal()"
                            class="w-14 h-14 rounded-full border-2 border-blue-500 object-cover bg-zinc-900 cursor-pointer active:scale-95 transition-transform">
                    </div>
                    <div id="rider-card"
                        class="hidden glass-card p-6 mb-8 border-l-4 border-green-500">
                        <div class="flex justify-between items-end">
                            <div><p
                                    class="text-[10px] opacity-50 uppercase">บิลวันนี้</p><h3
                                    class="text-4xl font-bold"
                                    id="today-bills">0</h3></div>
                            <div class="flex gap-2">
                                <button onclick="addDelivery(-1)"
                                    class="w-12 h-12 bg-white/5 rounded-2xl"><i
                                        class="fa-solid fa-minus"></i></button>
                                <button onclick="addDelivery(1)"
                                    class="w-12 h-12 bg-green-500 rounded-2xl"><i
                                        class="fa-solid fa-plus"></i></button>
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <button onclick="confirmAction('ลงเวลาเข้างาน?', tapIn)"
                            class="h-32 glass-card flex flex-col items-center justify-center gap-2"><i
                                class="fa-solid fa-clock text-3xl text-blue-500"></i><span
                                class="text-[10px] font-bold uppercase">Time
                                In</span></button>
                        <button onclick="confirmAction('ลงเวลาออกงาน?', tapOut)"
                            class="h-32 glass-card flex flex-col items-center justify-center gap-2"><i
                                class="fa-solid fa-clock-rotate-left text-3xl text-zinc-500"></i><span
                                class="text-[10px] font-bold uppercase">Time
                                Out</span></button>
                    </div>
                    <div class="space-y-6 text-center">
                        <div><p
                                class="text-[10px] opacity-30 font-bold uppercase">Estimated
                                Salary</p><div
                                class="flex items-baseline justify-center gap-1"><span
                                    class="text-2xl font-bold text-white/50">฿</span><h1
                                    id="salary-view"
                                    class="text-5xl font-bold">0.00</h1></div><p
                                id="salary-detail"
                                class="text-[10px] opacity-40 mt-1 italic"></p></div>
                        <div class="p-5 glass-card bg-blue-500/5"><div
                                id="work-timer"
                                class="text-4xl font-mono font-bold text-blue-400">00:00:00</div></div>
                    </div>
                </section>

                <section id="p-admin" class="page">
                    <h2
                        class="text-2xl font-bold mb-6 italic uppercase text-blue-500">Management</h2>

                    <div id="user-list" class="space-y-3"></div>

                    <div class="mt-8 pt-6 border-t border-white/10 space-y-4">
                        <label
                            class="text-[10px] opacity-40 ml-1 font-bold uppercase tracking-wider block">
                            <i
                                class="fa-solid fa-shield-halved mr-1 text-blue-400"></i>
                            Security & Audit Control
                        </label>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="viewSecurityLogs()"
                                class="py-4 px-4 bg-blue-500/10 hover:bg-blue-500/20 border border-blue-500/20 text-blue-400 rounded-2xl text-xs font-bold active:scale-95 transition flex items-center justify-center gap-2">
                                <i class="fa-solid fa-list-check text-sm"></i>
                                ตรวจสอบ LOGS
                            </button>
                            <button onclick="changeAdminPin()"
                                class="py-4 px-4 bg-zinc-900 hover:bg-zinc-800/80 border border-white/10 text-white rounded-2xl text-xs font-bold active:scale-95 transition flex items-center justify-center gap-2">
                                <i
                                    class="fa-solid fa-key text-sm text-yellow-500"></i>
                                เปลี่ยนรหัสลับแอดมิน
                            </button>
                        </div>
                        <div id="blocked-user-list" class="space-y-2 mt-4">
                        </div>
                        <script>
        // เรียกฟังก์ชันโหลดข้อมูลเมื่อหน้าเว็บโหลดเสร็จ
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof renderBlockedStaffList === 'function') {
                renderBlockedStaffList();
            }
        });
    </script>
                    </div>
                </section>

                <section id="p-week" class="page"><h2
                        class="text-2xl font-bold mb-6 italic uppercase">My
                        Schedule</h2><div
                        id="week-list" class="space-y-3"></div></section>

                <section id="p-cal" class="page">
                    <div class="flex justify-between items-center mb-6"><h2
                            id="mon-view"
                            class="text-xl font-bold text-blue-500 uppercase">...</h2><div
                            class="flex gap-4"><button
                                onclick="moveMonth(-1)"><i
                                    class="fa-solid fa-chevron-left"></i></button><button
                                onclick="moveMonth(1)"><i
                                    class="fa-solid fa-chevron-right"></i></button></div></div>
                    <div id="cal-days"
                        class="grid grid-cols-7 gap-2 text-center text-[10px] font-bold"></div>
                </section>
            </main>

            <nav
                class="fixed bottom-0 inset-x-0 bg-zinc-950/80 backdrop-blur-xl border-t border-white/5 p-4 flex justify-around items-center z-40 max-w-md mx-auto rounded-t-3xl shadow-2xl">
                <button onclick="go('p-home', this)"
                    class="nav-btn active flex flex-col items-center gap-1 text-zinc-500 transition-colors"><i
                        class="fa-solid fa-house-chimney text-lg"></i><span
                        class="text-[9px] font-bold tracking-wider uppercase">Home</span></button>
                <button id="nav-admin"
                    onclick="go('p-admin', this); loadUserList();"
                    class="nav-btn hidden flex flex-col items-center gap-1 text-zinc-500 transition-colors"><i
                        class="fa-solid fa-user-gear text-lg"></i><span
                        class="text-[9px] font-bold tracking-wider uppercase">Admin</span></button>
                <button onclick="go('p-week', this)"
                    class="nav-btn flex flex-col items-center gap-1 text-zinc-500 transition-colors"><i
                        class="fa-solid fa-calendar-week text-lg"></i><span
                        class="text-[9px] font-bold tracking-wider uppercase">Schedule</span></button>
                <button onclick="go('p-cal', this)"
                    class="nav-btn flex flex-col items-center gap-1 text-zinc-500 transition-colors"><i
                        class="fa-solid fa-calendar-days text-lg"></i><span
                        class="text-[9px] font-bold tracking-wider uppercase">Calendar</span></button>
                <button onclick="handleLogout()"
                    class="nav-btn flex flex-col items-center gap-1 text-red-500 opacity-80 hover:opacity-100 active:scale-95 transition-all">
                    <i class="fa-solid fa-right-from-bracket text-lg"></i>
                    <span
                        class="text-[9px] font-bold tracking-wider">LOGOUT</span>
                </button>

            </nav>
        </div>

        <div id="profile-modal"
            class="hidden fixed inset-0 z-50 bg-black/80 backdrop-blur-xl flex flex-col justify-end">
            <div
                class="bg-zinc-950 border-t border-white/10 rounded-t-[2.5rem] p-6 max-h-[90vh] overflow-y-auto max-w-md mx-auto w-full shadow-2xl">
                <div
                    class="flex justify-between items-center mb-8 pb-4 border-b border-white/5">
                    <div><h3 class="text-xl font-bold">Edit Profile</h3><p
                            class="text-[10px] opacity-40 uppercase font-bold mt-0.5">พนักงานสารสนเทศระบบ</p></div>
                    <button onclick="closeProfileModal()"
                        class="w-10 h-10 bg-white/5 rounded-full flex items-center justify-center active:scale-90 transition-transform"><i
                            class="fa-solid fa-xmark"></i></button>
                </div>

                <div class="space-y-6">
                    <div
                        class="flex items-center gap-5 bg-white/5 p-4 rounded-3xl border border-white/5">
                        <div class="relative group">
                            <img id="edit-photo-preview"
                                class="w-20 h-20 rounded-2xl object-cover bg-zinc-900 border border-white/10">
                            <label
                                class="absolute inset-0 bg-black/40 rounded-2xl flex items-center justify-center cursor-pointer opacity-0 group-hover:opacity-100 transition-opacity">
                                <i class="fa-solid fa-camera text-sm"></i>
                                <input type="file" accept="image/*"
                                    class="hidden"
                                    onchange="previewProfileImage(this)">
                            </label>
                        </div>
                        <div class="flex-1 space-y-1.5">
                            <label
                                class="text-[10px] opacity-40 font-bold uppercase block ml-1">Photo
                                Base64 URL</label>
                            <input type="text" id="edit-photo"
                                class="time-pill w-full text-xs bg-black/40 border-white/5"
                                readonly>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-1">
                                <label
                                    class="text-[9px] opacity-40 ml-1 font-bold uppercase">Username</label>
                                <input type="text" id="edit-user"
                                    class="time-pill w-full text-xs bg-white/5 border-white/10 opacity-50"
                                    readonly>
                            </div>
                            <div class="space-y-1">
                                <label
                                    class="text-[9px] opacity-40 ml-1 font-bold uppercase">Email
                                    Address</label>
                                <input type="text" id="edit-email"
                                    class="time-pill w-full text-xs bg-white/5 border-white/10 opacity-50"
                                    readonly>
                            </div>
                        </div>

                        <div class="space-y-1">
                            <label
                                class="text-[9px] opacity-40 ml-1 font-bold uppercase">Display
                                Name</label>
                            <input type="text" id="edit-name"
                                class="time-pill w-full text-xs bg-white/5 border-white/10">
                        </div>

                        <div class="space-y-1">
                            <label
                                class="text-[9px] opacity-40 ml-1 font-bold uppercase">New
                                Password (เปลี่ยนรหัสผ่าน)</label>
                            <input type="password" id="edit-pw"
                                placeholder="เว้นว่างไว้หากไม่ต้องการเปลี่ยน"
                                class="time-pill w-full text-xs bg-white/5 border-white/10">
                        </div>

                        <div id="admin-fields"
                            class="hidden pt-4 border-t border-white/5 grid grid-cols-2 gap-4">
                            <div class="space-y-1">
                                <label
                                    class="text-[9px] opacity-40 ml-1 font-bold uppercase">Base
                                    Salary (บาท)</label>
                                <input type="number" id="edit-salary"
                                    class="time-pill w-full text-xs bg-white/5 border-white/10">
                            </div>
                            <div class="space-y-1">
                                <label
                                    class="text-[9px] opacity-40 ml-1 font-bold uppercase">Bill
                                    Rate (บาท/บิล)</label>
                                <input type="number" id="edit-bill-rate"
                                    class="time-pill w-full text-xs bg-white/5 border-white/10">
                            </div>
                            <div class="space-y-1">
                                <label
                                    class="text-[9px] opacity-40 ml-1 font-bold uppercase">Job
                                    Type</label>
                                <select id="edit-job"
                                    class="time-pill w-full text-xs bg-white/5 border-white/10 appearance-none">
                                    <option value="staff"
                                        class="bg-zinc-900">Staff</option>
                                    <option value="delivery"
                                        class="bg-zinc-900">Delivery</option>
                                </select>
                            </div>
                            <div class="space-y-1">
                                <label
                                    class="text-[9px] opacity-40 ml-1 font-bold uppercase">System
                                    Role</label>
                                <select id="edit-role"
                                    class="time-pill w-full text-xs bg-white/5 border-white/10 appearance-none">
                                    <option value="staff"
                                        class="bg-zinc-900">Staff Role</option>
                                    <option value="admin"
                                        class="bg-zinc-900">Admin Role</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="pt-10 space-y-3">
                    <button onclick="saveProfile()"
                        class="w-full py-5 btn-primary font-bold text-sm tracking-widest active:scale-[0.98] transition-transform">
                        SAVE CHANGES
                    </button>
                </div>
            </div>
        </div>

        <script src="app.js"></script>
    </body>
</html>
