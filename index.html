<!DOCTYPE html>
<html lang="th" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>IMS-Workflow Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="overflow-hidden h-screen font-[Anuphan] bg-black text-white">

    <div id="auth-ui" class="p-8 pt-24 space-y-8 h-full overflow-y-auto">
        <div id="login-box" class="space-y-6">
            <h1 class="text-4xl font-bold text-blue-500 tracking-tighter">IMS-Workflow</h1>
            <div class="space-y-3">
                <input type="text" id="l-id" placeholder="Username หรือ อีเมล" class="w-full bg-[#1c1c1e] p-4 rounded-2xl border-none outline-none focus:ring-2 ring-blue-500/50 transition-all">
                <input type="password" id="l-pw" placeholder="รหัสผ่าน" class="w-full bg-[#1c1c1e] p-4 rounded-2xl border-none outline-none focus:ring-2 ring-blue-500/50 transition-all">
            </div>
            <button onclick="doLogin()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold active:scale-95 transition-all shadow-lg shadow-blue-600/20">เข้าสู่ระบบ</button>
            <div class="flex justify-between px-2">
                <button onclick="forgotPassword()" class="text-zinc-500 text-xs">ลืมรหัสผ่าน?</button>
                <button onclick="toggleAuth(true)" class="text-blue-500 text-xs font-bold">สมัครสมาชิกใหม่</button>
            </div>
        </div>

        <div id="reg-box" class="space-y-6 hidden">
            <h1 class="text-4xl font-bold text-green-500 tracking-tighter">สร้างบัญชี</h1>
            <div class="space-y-3">
                <input type="text" id="r-user" placeholder="Username" class="w-full bg-[#1c1c1e] p-4 rounded-2xl outline-none focus:ring-2 ring-green-500/50">
                <input type="email" id="r-mail" placeholder="อีเมล" class="w-full bg-[#1c1c1e] p-4 rounded-2xl outline-none focus:ring-2 ring-green-500/50">
                <input type="password" id="r-pw" placeholder="รหัสผ่าน" class="w-full bg-[#1c1c1e] p-4 rounded-2xl outline-none focus:ring-2 ring-green-500/50">
                <input type="text" id="r-name" placeholder="ชื่อเล่น" class="w-full bg-[#1c1c1e] p-4 rounded-2xl outline-none focus:ring-2 ring-green-500/50">
                
                <p class="text-[10px] opacity-40 ml-2 uppercase font-bold tracking-widest">เลือกประเภทงาน</p>
                <div class="flex gap-2 p-1 bg-[#1c1c1e] rounded-2xl">
                    <button onclick="setRegType('staff')" id="btn-t-staff" class="flex-1 py-3 rounded-xl text-xs font-bold transition-all bg-green-600 text-white shadow-lg">พนักงาน</button>
                    <button onclick="setRegType('rider')" id="btn-t-rider" class="flex-1 py-3 rounded-xl text-xs font-bold transition-all text-zinc-500">Rider / Delivery</button>
                </div>
            </div>
            <button onclick="sendOTP()" class="w-full bg-green-600 py-4 rounded-2xl font-bold active:scale-95 transition-all">รับรหัส OTP ผ่านเมล</button>
            <button onclick="toggleAuth(false)" class="w-full text-zinc-500 text-sm">ย้อนกลับ</button>
        </div>
    </div>

    <div id="app-ui" class="hidden h-full">
        <main class="px-5 pt-12 h-full overflow-y-auto pb-32">
            
            <section id="p-home" class="page active">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <p class="text-[10px] opacity-40 uppercase tracking-widest">ยินดีต้อนรับ</p>
                        <h2 id="u-display" class="text-xl font-bold">...</h2>
                    </div>
                    <div class="relative" onclick="editProfile()">
                        <img id="u-photo" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="w-12 h-12 rounded-full border-2 border-blue-500/50 object-cover active:scale-90 transition cursor-pointer">
                        <div class="absolute -bottom-1 -right-1 bg-blue-500 w-5 h-5 rounded-full flex items-center justify-center border-2 border-black">
                            <i class="fa-solid fa-pen text-[8px]"></i>
                        </div>
                    </div>
                </div>
                
                <div class="text-center my-8">
                    <p class="text-[10px] opacity-30 uppercase font-bold tracking-widest">รายได้เดือนนี้ (Base + Delivery)</p>
                    <h1 class="text-5xl font-bold mt-2">฿<span id="salary-view">0.00</span></h1>
                </div>

                <div id="delivery-section" class="hidden glass-card p-5 mb-6 bg-gradient-to-r from-green-500/5 to-transparent">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="text-[10px] opacity-50 uppercase font-bold tracking-tighter">Delivery วันนี้</p>
                            <h3 class="text-xl font-bold"><span id="today-bills">0</span> บิล <span class="text-sm font-normal text-green-500 ml-1">(+฿<span id="today-delivery-money">0</span>)</span></h3>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="addDelivery(1)" class="bg-green-600/20 text-green-500 w-12 h-12 rounded-2xl flex items-center justify-center active:scale-90 transition shadow-lg">
                                <i class="fa-solid fa-plus text-xl"></i>
                            </button>
                            <button onclick="quickAddDelivery()" class="bg-blue-600/20 text-blue-500 w-12 h-12 rounded-2xl flex items-center justify-center active:scale-90 transition shadow-lg">
                                <i class="fa-solid fa-keyboard text-xl"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="tapIn()" class="h-44 glass-card bg-blue-600/10 flex flex-col items-center justify-center gap-4 active:scale-95 transition">
                        <i class="fa-solid fa-bolt text-3xl text-blue-500"></i>
                        <span class="font-bold text-[10px] tracking-widest">CHECK IN</span>
                    </button>
                    <button onclick="tapOut()" class="h-44 glass-card bg-zinc-600/5 flex flex-col items-center justify-center gap-4 active:scale-95 transition">
                        <i class="fa-solid fa-moon text-3xl text-zinc-600"></i>
                        <span class="font-bold text-[10px] opacity-40 tracking-widest">CHECK OUT</span>
                    </button>
                </div>
            </section>

            <section id="p-admin" class="page">
                <h2 class="text-2xl font-bold mt-10 mb-2">Admin Dashboard</h2>
                <p class="text-xs opacity-40 mb-6">จัดการพนักงานและค่าตอบแทน</p>
                <div id="user-list" class="space-y-3"></div>
            </section>

            <section id="p-week" class="page"><div id="week-list" class="space-y-3 mt-10"></div></section>
            
            <section id="p-cal" class="page">
                <div class="flex justify-between items-center mb-6 mt-10">
                    <h2 class="text-2xl font-bold">ปฏิทิน</h2>
                    <div class="flex items-center gap-4 bg-white/5 px-4 py-2 rounded-full">
                        <button onclick="moveMonth(-1)"><i class="fa-solid fa-chevron-left text-xs"></i></button>
                        <span id="mon-view" class="text-xs font-bold w-24 text-center"></span>
                        <button onclick="moveMonth(1)"><i class="fa-solid fa-chevron-right text-xs"></i></button>
                    </div>
                </div>
                <div class="glass-card p-4"><div id="cal-grid" class="grid grid-cols-7 gap-2"></div></div>
            </section>
        </main>

        <input type="file" id="file-input" accept="image/*" class="hidden" onchange="handleFileUpload(this)">

        <nav class="fixed bottom-8 left-6 right-6 glass-card p-2 flex justify-around items-center shadow-2xl">
            <button onclick="go('p-home', this)" class="nav-btn active p-4"><i class="fa-solid fa-house"></i></button>
            <button id="nav-admin" onclick="go('p-admin', this)" class="nav-btn p-4 hidden"><i class="fa-solid fa-users-cog"></i></button>
            <button onclick="go('p-week', this)" class="nav-btn p-4"><i class="fa-solid fa-clock"></i></button>
            <button onclick="go('p-cal', this)" class="nav-btn p-4"><i class="fa-solid fa-calendar-alt"></i></button>
            <button onclick="confirmLogout()" class="p-4 text-red-500/40"><i class="fa-solid fa-power-off"></i></button>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
