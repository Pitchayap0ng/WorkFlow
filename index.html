<!DOCTYPE html>
<html lang="th" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CleanFlow Pro - Night Shift Ready</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600;700&display=swap');
        :root { --ios-blue: #007AFF; --ios-green: #34C759; --ios-orange: #FF9500; --ios-gray: #3a3a3c; }
        body { font-family: 'Anuphan', sans-serif; background-color: #000; color: #fff; margin: 0; overflow: hidden; height: 100vh; }
        .page { display: none; height: 100vh; overflow-y: auto; padding-bottom: 140px; }
        .page.active { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .glass-card { background: rgba(28, 28, 30, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .day-node { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 14px; font-size: 14px; border: 1px solid transparent; position: relative; }
        .status-normal { background: rgba(52, 199, 89, 0.15); color: #34C759; }
        .status-late { background: rgba(255, 149, 0, 0.15); color: #FF9500; }
        .status-off { background: rgba(255, 255, 255, 0.05); color: rgba(255,255,255,0.3); }
        .day-today { border: 2px solid var(--ios-blue) !important; }
        .off-dot { width: 4px; height: 4px; background: currentColor; border-radius: 50%; margin-top: 2px; }
        input[type="time"] { background: transparent; border: none; color: var(--ios-blue); font-weight: bold; outline: none; }
    </style>
</head>
<body>

    <main class="pt-[env(safe-area-inset-top)] px-5">
        
        <section id="page-home" class="page active pt-8">
            <header class="mb-10 text-center">
                <p class="text-[11px] font-bold opacity-30 uppercase tracking-[0.2em]">Estimate Net Salary</p>
                <h1 class="text-5xl font-bold mt-2">฿<span id="salaryDisplay">0.00</span></h1>
            </header>
            <div class="grid gap-4">
                <button onclick="checkIn()" class="h-44 glass-card bg-gradient-to-br from-blue-600/20 to-blue-400/10 flex flex-col items-center justify-center gap-3">
                    <div class="w-14 h-14 rounded-full bg-blue-500 flex items-center justify-center shadow-lg"><i class="fa-solid fa-fingerprint text-2xl"></i></div>
                    <span class="text-xs font-bold tracking-widest">ลงเวลาเข้างาน</span>
                </button>
                <button onclick="checkOut()" class="h-24 glass-card flex items-center justify-center gap-3 opacity-60">
                    <i class="fa-solid fa-power-off"></i>
                    <span class="text-xs font-bold tracking-widest uppercase">ลงเวลาออก</span>
                </button>
            </div>
        </section>

        <section id="page-calendar" class="page pt-8">
            <div class="flex justify-between items-center mb-6 px-2">
                <h2 class="text-2xl font-bold">ปฏิทินงาน</h2>
                <div class="flex items-center gap-4 glass-card px-4 py-2">
                    <button onclick="changeMonth(-1)"><i class="fa-solid fa-chevron-left"></i></button>
                    <span id="monthDisplay" class="text-xs font-bold min-w-[90px] text-center"></span>
                    <button onclick="changeMonth(1)"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
            </div>
            <div class="glass-card p-4">
                <div class="calendar-grid mb-4 opacity-20 text-[10px] font-bold text-center uppercase">
                    <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
                </div>
                <div id="calendarDays" class="calendar-grid"></div>
            </div>
            <div class="mt-6 flex justify-center gap-6 text-[10px] font-bold opacity-40 uppercase">
                <div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-green-500"></div> ปกติ</div>
                <div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-orange-500"></div> สาย</div>
                <div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-white/20"></div> วันหยุด</div>
            </div>
        </section>

        <section id="page-settings" class="page pt-8">
            <h2 class="text-2xl font-bold mb-6">Settings</h2>
            <div class="space-y-4">
                <div class="glass-card p-5">
                    <p class="text-[10px] font-bold opacity-30 uppercase mb-2">Security (รหัสผ่าน 4 หลัก)</p>
                    <input type="password" id="appPass" maxlength="4" placeholder="ตั้งรหัสผ่านแก้ไขข้อมูล" onchange="saveConfig()" class="w-full bg-transparent text-xl font-bold border-b border-white/10 py-2 outline-none">
                </div>
                <div class="glass-card p-5">
                    <p class="text-[10px] font-bold opacity-30 uppercase mb-2">ค่าตอบแทน</p>
                    <input type="number" id="baseSalary" onchange="saveConfig()" class="w-full bg-transparent text-xl font-bold border-b border-white/10 py-2 outline-none">
                </div>
                <div id="shiftList" class="space-y-2"></div>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-8 left-6 right-6 glass-card p-2 flex justify-around items-center shadow-2xl z-50">
        <button onclick="switchPage('page-home', this)" class="p-4 active text-blue-500"><i class="fa-solid fa-house"></i></button>
        <button onclick="switchPage('page-calendar', this)" class="p-4 text-zinc-500"><i class="fa-solid fa-calendar-days"></i></button>
        <button onclick="switchPage('page-settings', this)" class="p-4 text-zinc-500"><i class="fa-solid fa-gear"></i></button>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA11zPbXEFs-sdIHKaxhkprkoGSGP1whfg",
            authDomain: "ims-fei.firebaseapp.com",
            databaseURL: "https://ims-fei-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ims-fei",
            storageBucket: "ims-fei.firebasestorage.app",
            messagingSenderId: "791711191329",
            appId: "1:791711191329:web:0a4ba03cd5f11eb71bae60"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let logs = [];
        let viewDate = new Date();
        let config = JSON.parse(localStorage.getItem('cf_pro_v3')) || { salary: 15000, shifts: {}, pass: "" };

        db.ref('attendance').on('value', snap => {
            const data = snap.val();
            logs = data ? Object.keys(data).map(id => ({ id, ...data[id] })) : [];
            renderAll();
        });

        // --- Logic สำหรับ กะดึก & คำนวณสาย ---
        function calculateStats(planIn, planOut, actualIn, actualOut) {
            let late = diffMins(planIn, actualIn);
            let ot = 0;
            if (actualOut) {
                let otMins = diffMins(planOut, actualOut);
                if (otMins < -600) otMins += 1440; // แก้ปัญหากะดึกที่เลิกงานเช้าอีกวัน
                ot = otMins > 60 ? Math.floor(otMins / 60) : 0;
            }
            return { late: late > 0 ? late : 0, ot };
        }

        function diffMins(t1, t2) {
            const [h1, m1] = t1.split(':').map(Number), [h2, m2] = t2.split(':').map(Number);
            return (h2 * 60 + m2) - (h1 * 60 + m1);
        }

        // --- ระบบแก้ไขข้อมูล (ต้องใส่รหัส) ---
        async function editDay(date) {
            // 1. ตรวจสอบรหัสผ่านก่อน
            if (config.pass) {
                const { value: typedPass } = await Swal.fire({
                    title: 'ยืนยันตัวตน',
                    input: 'password',
                    inputPlaceholder: 'รหัสผ่าน 4 หลัก',
                    background: '#1c1c1e', color: '#fff', confirmButtonColor: '#007AFF'
                });
                if (typedPass !== config.pass) return toast("รหัสผ่านไม่ถูกต้อง", "error");
            }

            const log = logs.find(l => l.date === date) || { date, checkIn: "", checkOut: "", planIn: "08:30", planOut: "17:30", isOff: false };

            const { value: form } = await Swal.fire({
                title: 'แก้ไขข้อมูลวันที่ ' + date,
                html: `
                    <div class="text-left space-y-3 p-2">
                        <label class="flex items-center gap-2 mb-4"><input type="checkbox" id="isOff" ${log.isOff ? 'checked' : ''}> วันนี้เป็นวันหยุด (OFF)</label>
                        <div class="grid grid-cols-2 gap-2">
                            <div><p class="text-[10px] opacity-40">กะเริ่ม</p><input id="pIn" type="time" class="w-full bg-zinc-800 p-2 rounded-lg" value="${log.planIn}"></div>
                            <div><p class="text-[10px] opacity-40">กะเลิก</p><input id="pOut" type="time" class="w-full bg-zinc-800 p-2 rounded-lg" value="${log.planOut}"></div>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div><p class="text-[10px] opacity-40">เข้าจริง</p><input id="aIn" type="time" class="w-full bg-zinc-800 p-2 rounded-lg" value="${log.checkIn}"></div>
                            <div><p class="text-[10px] opacity-40">ออกจริง</p><input id="aOut" type="time" class="w-full bg-zinc-800 p-2 rounded-lg" value="${log.checkOut}"></div>
                        </div>
                        <button onclick="deleteData('${log.id}')" style="color: #ff453a; font-size: 10px; margin-top: 10px;">ลบข้อมูลของวันนี้</button>
                    </div>`,
                showCancelButton: true,
                confirmButtonText: 'บันทึก',
                preConfirm: () => ({
                    isOff: document.getElementById('isOff').checked,
                    pIn: document.getElementById('pIn').value,
                    pOut: document.getElementById('pOut').value,
                    aIn: document.getElementById('aIn').value,
                    aOut: document.getElementById('aOut').value
                }),
                background: '#1c1c1e', color: '#fff'
            });

            if (form) {
                const stats = calculateStats(form.pIn, form.pOut, form.aIn, form.aOut);
                const data = {
                    date, isOff: form.isOff,
                    planIn: form.pIn, planOut: form.pOut,
                    checkIn: form.aIn, checkOut: form.aOut,
                    late: form.isOff ? 0 : stats.late,
                    ot: form.isOff ? 0 : stats.ot
                };

                if (log.id) db.ref('attendance/' + log.id).update(data);
                else db.ref('attendance').push(data);
                toast("บันทึกเรียบร้อย");
            }
        }

        function deleteData(id) {
            if(!id) return;
            Swal.fire({ title: 'ลบข้อมูล?', icon: 'warning', showCancelButton: true, background: '#1c1c1e', color: '#fff' }).then(r => {
                if(r.isConfirmed) { db.ref('attendance/'+id).remove(); Swal.close(); }
            });
        }

        // --- Render UI ---
        function renderAll() {
            // Salary Calculation (Exclude OFF days)
            const currentM = new Date().toISOString().slice(0, 7);
            const mData = logs.filter(l => l.date.startsWith(currentM) && !l.isOff);
            const totalOT = mData.reduce((s, l) => s + (l.ot || 0), 0);
            const otPay = totalOT * ((config.salary / 30 / 8) * 1.5);
            const net = (parseFloat(config.salary) + otPay) - Math.min(config.salary * 0.05, 750);
            document.getElementById('salaryDisplay').innerText = net.toLocaleString(undefined, { minimumFractionDigits: 2 });

            // Calendar
            const year = viewDate.getFullYear(), month = viewDate.getMonth();
            document.getElementById('monthDisplay').innerText = `${year + 543} / ${month + 1}`;
            const first = new Date(year, month, 1).getDay(), days = new Date(year, month+1, 0).getDate();
            const container = document.getElementById('calendarDays');
            container.innerHTML = '';
            for(let i=0; i<first; i++) container.innerHTML += '<div></div>';
            for(let d=1; d<=days; d++) {
                const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const log = logs.find(l => l.date === dStr);
                let status = log ? (log.isOff ? 'status-off' : (log.late > 0 ? 'status-late' : 'status-normal')) : '';
                const today = new Date().toISOString().split('T')[0] === dStr ? 'day-today' : '';
                container.innerHTML += `
                    <div onclick="editDay('${dStr}')" class="day-node ${status} ${today}">
                        ${d} ${log?.isOff ? '<div class="off-dot"></div>' : ''}
                    </div>`;
            }
        }

        // --- Check In/Out (Default Logic) ---
        function checkIn() {
            const now = new Date(), date = now.toISOString().split('T')[0], time = now.toTimeString().slice(0, 5);
            if (logs.find(l => l.date === date)) return toast("วันนี้ลงเวลาไปแล้วครับ", "info");
            const dayName = ['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์'][now.getDay()];
            const pIn = config.shifts[dayName]?.in || "08:30";
            const stats = calculateStats(pIn, config.shifts[dayName]?.out || "17:30", time, "");
            db.ref('attendance').push({ date, checkIn: time, checkOut: "", late: stats.late, ot: 0, planIn: pIn, planOut: config.shifts[dayName]?.out || "17:30", isOff: false });
            toast("ลงเวลาเข้างานเรียบร้อยแล้ว");
        }

        function checkOut() {
            const now = new Date(), date = now.toISOString().split('T')[0], time = now.toTimeString().slice(0, 5);
            const today = logs.find(l => l.date === date);
            if (!today) return toast("ยังไม่ได้ลงเวลาเข้า!", "error");
            const stats = calculateStats(today.planIn, today.planOut, today.checkIn, time);
            db.ref('attendance/' + today.id).update({ checkOut: time, ot: stats.ot });
            toast("ลงเวลาเลิกงานเรียบร้อยแล้ว");
        }

        function switchPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => { b.classList.remove('text-blue-500'); b.classList.add('text-zinc-500'); });
            btn.classList.add('text-blue-500');
        }

        function changeMonth(s) { viewDate.setMonth(viewDate.getMonth() + s); renderAll(); }
        
        function saveConfig() {
            config.salary = document.getElementById('baseSalary').value;
            config.pass = document.getElementById('appPass').value;
            localStorage.setItem('cf_pro_v3', JSON.stringify(config));
            renderAll();
        }

        function toast(m, i="success") { Swal.fire({ title: m, icon: i, timer: 1500, showConfirmButton: false, background: '#1c1c1e', color: '#fff' }); }

        window.onload = () => {
            document.getElementById('baseSalary').value = config.salary;
            document.getElementById('appPass').value = config.pass;
            renderAll();
        };
    </script>
</body>
</html>
