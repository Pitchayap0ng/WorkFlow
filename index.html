<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>IMS-Workflow SUPREME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-white h-screen overflow-hidden">

    <div id="auth-ui" class="p-8 pt-20 h-full overflow-y-auto">
        <div class="max-w-md mx-auto">
            <h1 class="text-4xl font-bold text-blue-500 text-center tracking-tighter mb-12">IMS-Workflow</h1>
            
            <div id="login-box" class="space-y-4">
                <input type="text" id="l-id" placeholder="Username หรือ Email" class="w-full bg-[#1c1c1e] p-5 rounded-2xl border border-white/5 outline-none focus:border-blue-500 transition">
                <input type="password" id="l-pw" placeholder="Password" class="w-full bg-[#1c1c1e] p-5 rounded-2xl border border-white/5 outline-none focus:border-blue-500 transition">
                <button onclick="doLogin()" class="w-full bg-blue-600 py-5 rounded-2xl font-bold text-lg active:scale-95 transition shadow-lg shadow-blue-600/20">เข้าสู่ระบบ</button>
                <div class="flex justify-between px-2 text-[11px] font-bold uppercase opacity-50">
                    <button onclick="toggleAuth(true)">สมัครสมาชิกใหม่</button>
                    <button onclick="forgotPW()">ลืมรหัสผ่าน?</button>
                </div>
            </div>

            <div id="reg-box" class="hidden space-y-4">
                <input type="text" id="r-name" placeholder="ชื่อ-นามสกุล" class="w-full bg-[#1c1c1e] p-5 rounded-2xl border border-white/5">
                <input type="text" id="r-user" placeholder="Username (อังกฤษ)" class="w-full bg-[#1c1c1e] p-5 rounded-2xl border border-white/5">
                <input type="email" id="r-email" placeholder="อีเมลสำหรับรับ OTP" class="w-full bg-[#1c1c1e] p-5 rounded-2xl border border-white/5">
                <input type="tel" id="r-phone" placeholder="เบอร์โทรศัพท์" class="w-full bg-[#1c1c1e] p-5 rounded-2xl border border-white/5">
                <input type="password" id="r-pw" placeholder="รหัสผ่าน (6 ตัวขึ้นไป)" class="w-full bg-[#1c1c1e] p-5 rounded-2xl border border-white/5">
                <button onclick="sendOTP()" class="w-full bg-blue-600 py-5 rounded-2xl font-bold text-lg active:scale-95 transition">ส่ง Email OTP และสมัครสมาชิก</button>
                <button onclick="toggleAuth(false)" class="w-full text-center text-[10px] opacity-40 underline mt-4 uppercase">ยกเลิกแล้วกลับไปหน้าล็อกอิน</button>
            </div>
        </div>
    </div>

    <div id="app-ui" class="hidden h-full flex flex-col">
        <main class="flex-1 px-5 pt-12 overflow-y-auto pb-32">
            
            <section id="p-home" class="page active">
                <div id="remote-banner" onclick="openEditProfile()" class="hidden bg-orange-600/20 border border-orange-500/30 p-4 rounded-2xl mb-6 flex justify-between items-center cursor-pointer">
                    <div>
                        <p class="text-[9px] font-bold text-orange-500 uppercase tracking-widest">กำลังจัดการระบบให้:</p>
                        <p class="text-sm font-bold text-white"><span id="remote-name">...</span></p>
                    </div>
                    <button onclick="event.stopPropagation(); exitAdminView()" class="bg-orange-500 text-white text-[10px] px-4 py-2 rounded-xl font-bold">ออกจากการคุม</button>
                </div>

                <div class="flex justify-between items-center mb-10">
                    <div onclick="openEditProfile()" class="cursor-pointer">
                        <p class="text-[10px] opacity-40 font-bold uppercase tracking-widest">ข้อมูลพนักงาน,</p>
                        <h2 id="u-display" class="text-2xl font-bold">...</h2>
                    </div>
                    <img id="u-photo" onclick="openEditProfile()" src="" class="w-16 h-16 rounded-full border-2 border-blue-500 object-cover bg-zinc-900 shadow-2xl cursor-pointer">
                </div>

                <div id="rider-card" class="hidden glass-card p-6 mb-8 border-l-4 border-l-green-500">
                    <div class="flex justify-between items-end">
                        <div>
                            <p class="text-[10px] opacity-50 font-bold uppercase mb-1">ยอดส่งบิลวันนี้</p>
                            <h3 class="text-4xl font-bold"><span id="today-bills">0</span> <small class="text-sm opacity-30">ใบ</small></h3>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="addDelivery(-1)" class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center active:bg-red-500/20"><i class="fa-solid fa-minus"></i></button>
                            <button onclick="addDelivery(1)" class="w-12 h-12 rounded-2xl bg-green-500 text-white flex items-center justify-center shadow-lg active:scale-90 transition"><i class="fa-solid fa-plus"></i></button>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="tapIn()" class="h-36 glass-card flex flex-col items-center justify-center gap-4 active:scale-95 transition">
                        <div class="w-12 h-12 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-500"><i class="fa-solid fa-clock"></i></div>
                        <span class="text-[10px] font-bold uppercase">Time In</span>
                    </button>
                    <button onclick="tapOut()" class="h-36 glass-card flex flex-col items-center justify-center gap-4 active:scale-95 transition">
                        <div class="w-12 h-12 rounded-full bg-zinc-800 flex items-center justify-center text-zinc-500"><i class="fa-solid fa-door-open"></i></div>
                        <span class="text-[10px] font-bold uppercase">Time Out</span>
                    </button>
                </div>

                <div class="mt-8 text-center">
                    <p class="text-[10px] opacity-30 font-bold uppercase tracking-[0.2em]">เงินเดือนเดือนนี้ (โดยประมาณ)</p>
                    <h1 class="text-5xl font-bold mt-2 text-white">฿<span id="salary-view">0.00</span></h1>
                </div>
            </section>

            <section id="p-admin" class="page">
                <h2 class="text-2xl font-bold mb-8 mt-6 text-center text-blue-500 tracking-tighter uppercase italic">Manage Employee</h2>
                <div id="user-list" class="space-y-4"></div>
            </section>

            <section id="p-week" class="page">
                <h2 class="text-2xl font-bold mb-6">ตารางทำงานรายสัปดาห์</h2>
                <div id="week-list" class="space-y-3"></div>
            </section>

            <section id="p-cal" class="page">
                <div class="flex justify-between items-center mb-8">
                    <h2 id="mon-view" class="text-2xl font-bold text-blue-500">...</h2>
                    <div class="flex gap-6">
                        <button onclick="moveMonth(-1)"><i class="fa-solid fa-chevron-left"></i></button>
                        <button onclick="moveMonth(1)"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                </div>
                <div id="cal-grid" class="grid grid-cols-7 gap-3 mb-8"></div>
            </section>
        </main>

        <nav class="fixed bottom-8 left-6 right-6 glass-card p-3 flex justify-around items-center shadow-2xl z-50">
            <button onclick="go('p-home', this)" class="nav-btn active p-4 text-xl"><i class="fa-solid fa-house"></i></button>
            <button id="nav-admin" onclick="go('p-admin', this)" class="nav-btn p-4 text-xl hidden"><i class="fa-solid fa-users-gear"></i></button>
            <button onclick="go('p-week', this)" class="nav-btn p-4 text-xl"><i class="fa-solid fa-calendar-day"></i></button>
            <button onclick="go('p-cal', this)" class="nav-btn p-4 text-xl"><i class="fa-solid fa-clock-rotate-left"></i></button>
            <button onclick="doLogout()" class="p-4 text-red-500/40 text-xl"><i class="fa-solid fa-power-off"></i></button>
        </nav>
    </div>

    <script src="app.js"></script>
</body>
</html>
