<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>IMS-Workflow SUPREME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-white h-screen overflow-hidden">

    <div id="auth-ui" class="p-8 pt-20 h-full overflow-y-auto">
        <div class="max-w-md mx-auto slide-up">
            <h1 class="text-4xl font-bold text-blue-500 text-center mb-12 tracking-tighter">IMS-Workflow</h1>
            
            <div id="login-box" class="space-y-4">
                <input type="text" id="l-id" placeholder="Username / Email" class="time-pill w-full p-5">
                <input type="password" id="l-pw" placeholder="Password" class="time-pill w-full p-5">
                <button onclick="doLogin()" class="btn-primary w-full py-5 text-lg">เข้าสู่ระบบ</button>
                <div class="flex justify-between px-2 text-[10px] font-bold uppercase opacity-40">
                    <button onclick="toggleAuth(true)">สมัครสมาชิก</button>
                    <button onclick="forgotPW()">ลืมรหัสผ่าน?</button>
                </div>
            </div>

            <div id="reg-box" class="hidden space-y-4">
                <input type="text" id="r-name" placeholder="ชื่อ-นามสกุล" class="time-pill w-full p-5">
                <input type="text" id="r-user" placeholder="Username" class="time-pill w-full p-5">
                <input type="email" id="r-email" placeholder="อีเมล" class="time-pill w-full p-5">
                <input type="tel" id="r-phone" placeholder="เบอร์โทรศัพท์" class="time-pill w-full p-5">
                <input type="password" id="r-pw" placeholder="รหัสผ่าน (6 ตัวขึ้นไป)" class="time-pill w-full p-5">
                <button onclick="sendOTP()" class="btn-primary w-full py-5 text-lg">ส่ง OTP และสมัคร</button>
                <button onclick="toggleAuth(false)" class="w-full text-center text-xs opacity-40 underline mt-4">กลับไปหน้าล็อกอิน</button>
            </div>
        </div>
    </div>

    <div id="app-ui" class="hidden h-full flex flex-col">
        <main class="flex-1 px-5 pt-12 overflow-y-auto pb-32">
            
            <section id="p-home" class="page active">
                <div id="remote-banner" class="hidden bg-orange-600/20 border border-orange-500/40 p-4 rounded-2xl mb-6 flex justify-between items-center bounce-in">
                    <div>
                        <p class="text-[9px] font-bold text-orange-500 uppercase tracking-widest">Remote Access</p>
                        <p class="font-bold text-sm" id="remote-name">...</p>
                    </div>
                    <button onclick="exitAdminView()" class="bg-orange-600 px-4 py-2 rounded-xl text-xs font-bold active:scale-90 transition">EXIT</button>
                </div>

                <div class="flex justify-between items-center mb-10 slide-in">
                    <div onclick="openEditProfile()" class="cursor-pointer">
                        <p class="text-[10px] opacity-40 uppercase font-bold tracking-widest">พนักงาน,</p>
                        <h2 id="u-display" class="text-2xl font-bold">...</h2>
                    </div>
                    <div class="relative group">
                        <img id="u-photo" onclick="triggerUpload()" src="" class="w-16 h-16 rounded-full border-2 border-blue-500 object-cover bg-zinc-900 shadow-2xl cursor-pointer active:scale-90 transition">
                        <div class="absolute -bottom-1 -right-1 bg-blue-500 w-6 h-6 rounded-full flex items-center justify-center text-[10px] border-2 border-black">
                            <i class="fa-solid fa-camera"></i>
                        </div>
                        <input type="file" id="u-file" class="hidden" accept="image/*" onchange="uploadPhoto(this)">
                    </div>
                </div>

                <div id="rider-card" class="hidden glass-card p-6 mb-8 border-l-4 border-green-500 bounce-in">
                    <div class="flex justify-between items-end">
                        <div>
                            <p class="text-[10px] opacity-50 uppercase font-bold">ยอดบิลวันนี้</p>
                            <h3 class="text-4xl font-bold" id="today-bills">0</h3>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="addDelivery(-1)" class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center active:bg-red-500/20"><i class="fa-solid fa-minus"></i></button>
                            <button onclick="addDelivery(1)" class="w-12 h-12 bg-green-500 rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition"><i class="fa-solid fa-plus"></i></button>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="tapIn()" class="h-32 glass-card flex flex-col items-center justify-center gap-2 active:scale-95 transition">
                        <i class="fa-solid fa-fingerprint text-3xl text-blue-500"></i>
                        <span class="text-[10px] font-bold uppercase">Time In</span>
                    </button>
                    <button onclick="tapOut()" class="h-32 glass-card flex flex-col items-center justify-center gap-2 active:scale-95 transition">
                        <i class="fa-solid fa-right-from-bracket text-3xl text-zinc-500"></i>
                        <span class="text-[10px] font-bold uppercase">Time Out</span>
                    </button>
                </div>

                <div class="mt-8 text-center bounce-in">
                    <p class="text-[10px] opacity-30 font-bold uppercase tracking-widest">เงินเดือนโดยประมาณ</p>
                    <h1 class="text-5xl font-bold">฿<span id="salary-view">0.00</span></h1>
                </div>
            </section>

            <section id="p-admin" class="page">
                <h2 class="text-2xl font-bold mb-6 text-blue-500 uppercase italic">Employee Management</h2>
                <div id="user-list" class="space-y-3"></div>
            </section>

            <section id="p-week" class="page">
                <h2 class="text-2xl font-bold mb-6 italic">Weekly Shifts</h2>
                <div id="week-list" class="space-y-3"></div>
            </section>

            <section id="p-cal" class="page">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="mon-view" class="text-xl font-bold text-blue-500">...</h2>
                    <div class="flex gap-4">
                        <button onclick="moveMonth(-1)" class="p-2 opacity-50"><i class="fa-solid fa-chevron-left"></i></button>
                        <button onclick="moveMonth(1)" class="p-2 opacity-50"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                </div>
                <div id="cal-grid" class="grid grid-cols-7 gap-2 mb-8 slide-in"></div>
                <div class="mt-8 border-t border-white/5 pt-6 slide-up">
                    <p class="text-[10px] opacity-40 font-bold uppercase mb-4 tracking-widest">Activity Logs</p>
                    <div id="log-list" class="space-y-3"></div>
                </div>
            </section>
        </main>

        <nav class="fixed bottom-8 left-6 right-6 glass-card p-3 flex justify-around items-center shadow-2xl z-50">
            <button onclick="go('p-home', this)" class="nav-btn active"><i class="fa-solid fa-house"></i></button>
            <button id="nav-admin" onclick="go('p-admin', this)" class="nav-btn hidden"><i class="fa-solid fa-shield-halved"></i></button>
            <button onclick="go('p-week', this)" class="nav-btn"><i class="fa-solid fa-calendar"></i></button>
            <button onclick="go('p-cal', this)" class="nav-btn"><i class="fa-solid fa-history"></i></button>
            <button onclick="doLogout()" class="p-4 text-red-500/30 active:text-red-500"><i class="fa-solid fa-power-off"></i></button>
        </nav>
    </div>

    <script src="app.js"></script>
</body>
</html>
