<!DOCTYPE html>
<html lang="th" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CleanFlow Fix</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anuphan:wght@300;500;700&display=swap');
        body { font-family: 'Anuphan', sans-serif; background-color: #000; color: #fff; overflow: hidden; height: 100vh; }
        .page { display: none; height: 100vh; overflow-y: auto; padding-bottom: 120px; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .ios-card { background: rgba(28, 28, 30, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 2rem; }
    </style>
</head>
<body>
    <main class="pt-[env(safe-area-inset-top)] px-6">
        <section id="page-home" class="page active pt-10">
            <header class="mb-8">
                <p class="text-[10px] font-bold opacity-40 uppercase tracking-widest">เงินเดือนสุทธิ (รวม OT - หักประกันสังคม)</p>
                <h1 class="text-4xl font-bold">฿<span id="salaryDisplay">0.00</span></h1>
            </header>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <button onclick="checkIn()" class="h-44 ios-card bg-indigo-600 border-none flex flex-col items-center justify-center gap-3 active:scale-95 transition-all">
                    <i class="fa-solid fa-play text-2xl"></i>
                    <span class="text-xs font-bold uppercase">Check In</span>
                </button>
                <button onclick="checkOut()" class="h-44 ios-card flex flex-col items-center justify-center gap-3 active:scale-95 transition-all">
                    <i class="fa-solid fa-stop text-2xl"></i>
                    <span class="text-xs font-bold uppercase">Check Out</span>
                </button>
            </div>
            <div id="historyList" class="space-y-3"></div>
        </section>

        <section id="page-settings" class="page pt-10">
            <h2 class="text-2xl font-bold mb-6">ตั้งค่า</h2>
            <div class="ios-card p-6 space-y-6">
                <div>
                    <label class="text-[10px] font-bold opacity-30 uppercase">เงินเดือนพื้นฐาน</label>
                    <input type="number" id="baseSalary" onchange="updateSets()" class="w-full bg-transparent text-xl font-bold border-b border-white/10 py-2 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] font-bold opacity-30 uppercase">เวลาเข้างาน</label><input type="time" id="startTime" onchange="updateSets()" class="w-full bg-transparent py-2 outline-none"></div>
                    <div><label class="text-[10px] font-bold opacity-30 uppercase">เวลาเลิกงาน</label><input type="time" id="endTime" onchange="updateSets()" class="w-full bg-transparent py-2 outline-none"></div>
                </div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-10 left-6 right-6 ios-card p-2 flex justify-around items-center shadow-2xl z-50">
        <button onclick="switchPage('page-home', this)" class="p-4 text-indigo-500"><i class="fa-solid fa-clock"></i></button>
        <button onclick="switchPage('page-settings', this)" class="p-4 text-zinc-500"><i class="fa-solid fa-gear"></i></button>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA11zPbXEFs-sdIHKaxhkprkoGSGP1whfg",
            authDomain: "ims-fei.firebaseapp.com",
            databaseURL: "https://ims-fei-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ims-fei",
            storageBucket: "ims-fei.firebasestorage.app",
            messagingSenderId: "791711191329",
            appId: "1:791711191329:web:0a4ba03cd5f11eb71bae60"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let logs = [];
        let sets = JSON.parse(localStorage.getItem('cf_sets')) || { salary: 15000, start: "08:30", end: "17:30" };

        db.ref('attendance').on('value', snap => {
            const data = snap.val();
            logs = data ? Object.keys(data).map(id => ({ id, ...data[id] })) : [];
            logs.sort((a, b) => new Date(b.date) - new Date(a.date));
            render();
        });

        function checkIn() {
            const now = new Date(), date = now.toISOString().split('T')[0], time = now.toTimeString().slice(0, 5);
            if (logs.find(l => l.date === date)) return Swal.fire({ title: "วันนี้ลงเวลาแล้ว", icon: "warning", background: "#1c1c1e", color: "#fff" });
            
            const late = diff(sets.start, time);
            db.ref('attendance').push({ date, checkIn: time, checkOut: "", late: late > 0 ? late : 0, ot: 0 });
            Swal.fire({ title: "Check In สำเร็จ", icon: "success", timer: 1000, showConfirmButton: false });
        }

        function checkOut() {
            const now = new Date(), date = now.toISOString().split('T')[0], time = now.toTimeString().slice(0, 5);
            const todayLog = logs.find(l => l.date === date);
            if (!todayLog) return Swal.fire({ title: "ยังไม่ได้ Check In ของวันนี้!", icon: "error", background: "#1c1c1e", color: "#fff" });
            if (todayLog.checkOut) return Swal.fire({ title: "Check Out ไปแล้ว", icon: "info", background: "#1c1c1e", color: "#fff" });

            const otMin = diff(sets.end, time);
            const otHour = otMin > 60 ? Math.floor(otMin / 60) : 0;
            db.ref('attendance/' + todayLog.id).update({ checkOut: time, ot: otHour });
            Swal.fire({ title: "Check Out สำเร็จ", icon: "success", timer: 1000, showConfirmButton: false });
        }

        function render() {
            const currentMonth = new Date().toISOString().slice(0, 7);
            const mData = logs.filter(l => l.date.startsWith(currentMonth));
            
            const totalOT = mData.reduce((s, l) => s + (l.ot || 0), 0);
            const otPay = totalOT * ((sets.salary / 30 / 8) * 1.5);
            const sso = Math.min(sets.salary * 0.05, 750);
            const net = (parseFloat(sets.salary) + otPay) - sso;

            document.getElementById('salaryDisplay').innerText = net.toLocaleString(undefined, { minimumFractionDigits: 2 });
            document.getElementById('historyList').innerHTML = mData.slice(0, 5).map(l => `
                <div class="ios-card p-5 flex justify-between items-center">
                    <div><p class="text-xs font-bold">${l.date}</p><p class="text-[10px] opacity-40">${l.checkIn} - ${l.checkOut || 'กำลังทำงาน...'}</p></div>
                    <div class="text-right">
                        ${l.late > 0 ? `<p class="text-[9px] text-rose-500 font-bold">สาย ${l.late} นาที</p>` : ''}
                        ${l.ot > 0 ? `<p class="text-[9px] text-indigo-400 font-bold">OT ${l.ot} ชม.</p>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function diff(t1, t2) {
            const [h1, m1] = t1.split(':').map(Number), [h2, m2] = t2.split(':').map(Number);
            return (h2 * 60 + m2) - (h1 * 60 + m1);
        }

        function switchPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('text-indigo-500', 'text-zinc-500'));
            btn.classList.replace('text-zinc-500', 'text-indigo-500');
        }

        function updateSets() {
            sets = { salary: document.getElementById('baseSalary').value, start: document.getElementById('startTime').value, end: document.getElementById('endTime').value };
            localStorage.setItem('cf_sets', JSON.stringify(sets));
            render();
        }

        window.onload = () => {
            document.getElementById('baseSalary').value = sets.salary;
            document.getElementById('startTime').value = sets.start;
            document.getElementById('endTime').value = sets.end;
        };
    </script>
</body>
</html>
