<!DOCTYPE html>
<html lang="th" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CleanFlow Premium V2</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;600;700&display=swap');
        :root { --ios-blue: #007AFF; --ios-bg: #000000; }
        body { font-family: 'Anuphan', sans-serif; background-color: var(--ios-bg); color: #fff; margin: 0; overflow: hidden; height: 100vh; }
        .page { display: none; height: 100vh; overflow-y: auto; padding-bottom: 140px; -webkit-overflow-scrolling: touch; }
        .page.active { display: block; animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .glass-card { background: rgba(28, 28, 30, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day-node { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 14px; font-size: 14px; font-weight: 600; transition: 0.2s; border: 1px solid transparent; }
        .status-normal { background: rgba(52, 199, 89, 0.15); color: #34C759; border-color: rgba(52, 199, 89, 0.3); }
        .status-late { background: rgba(255, 149, 0, 0.15); color: #FF9500; border-color: rgba(255, 149, 0, 0.3); }
        .day-today { border: 2px solid var(--ios-blue) !important; }
        .btn-press:active { transform: scale(0.96); opacity: 0.8; }
        nav button.active { color: var(--ios-blue); }
    </style>
</head>
<body>

    <main class="pt-[env(safe-area-inset-top)] px-5">
        
        <section id="page-home" class="page active pt-8">
            <header class="mb-10">
                <p class="text-[11px] font-bold opacity-30 uppercase tracking-widest">เงินเดือนโดยประมาณ</p>
                <h1 class="text-5xl font-bold mt-1">฿<span id="salaryDisplay">0.00</span></h1>
            </header>
            <div class="space-y-4">
                <button onclick="checkIn()" class="w-full h-44 glass-card bg-gradient-to-br from-blue-600/20 to-indigo-600/20 flex flex-col items-center justify-center gap-3 btn-press">
                    <div class="w-16 h-16 rounded-full bg-blue-500 flex items-center justify-center shadow-lg shadow-blue-500/40"><i class="fa-solid fa-bolt text-2xl"></i></div>
                    <span class="text-xs font-bold tracking-[0.2em] uppercase">Check In</span>
                </button>
                <button onclick="checkOut()" class="w-full h-24 glass-card flex items-center justify-center gap-4 btn-press opacity-60">
                    <i class="fa-solid fa-moon text-xl"></i>
                    <span class="text-xs font-bold tracking-widest uppercase">Check Out</span>
                </button>
            </div>
        </section>

        <section id="page-calendar" class="page pt-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">ตารางเวลา</h2>
                <div class="flex items-center gap-4 glass-card px-4 py-2">
                    <button onclick="changeMonth(-1)"><i class="fa-solid fa-chevron-left text-xs"></i></button>
                    <span id="monthDisplay" class="text-sm font-bold min-w-[110px] text-center uppercase"></span>
                    <button onclick="changeMonth(1)"><i class="fa-solid fa-chevron-right text-xs"></i></button>
                </div>
            </div>

            <div class="glass-card p-5 mb-6">
                <div class="calendar-grid mb-4 opacity-20 text-[10px] font-bold text-center">
                    <div>อา.</div><div>จ.</div><div>อ.</div><div>พ.</div><div>พฤ.</div><div>ศ.</div><div>ส.</div>
                </div>
                <div id="calendarDays" class="calendar-grid"></div>
            </div>

            <div id="dayDetail" class="glass-card p-5 hidden">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <p id="detailDate" class="text-[10px] font-bold text-blue-400 uppercase tracking-tighter"></p>
                        <p class="text-sm font-bold mt-1">รายละเอียดงาน</p>
                    </div>
                    <button onclick="editDailyPlan()" class="text-[10px] font-bold bg-white/5 px-3 py-1.5 rounded-full border border-white/10">
                        <i class="fa-solid fa-calendar-day mr-1"></i> แก้แผนกะงาน
                    </button>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white/5 p-3 rounded-2xl">
                        <p class="text-[9px] opacity-40 mb-1">เวลาเข้าจริง</p>
                        <p id="detailIn" class="text-lg font-bold">-</p>
                    </div>
                    <div class="bg-white/5 p-3 rounded-2xl">
                        <p class="text-[9px] opacity-40 mb-1">เวลาออกจริง</p>
                        <p id="detailOut" class="text-lg font-bold">-</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="page-settings" class="page pt-8">
            <h2 class="text-2xl font-bold mb-6">กะงาน & ตั้งค่า</h2>
            <div class="glass-card p-6 mb-6">
                <label class="text-[10px] font-bold opacity-30 uppercase tracking-widest">ฐานเงินเดือน</label>
                <input type="number" id="baseSalary" onchange="saveConfig()" class="w-full bg-transparent text-2xl font-bold border-b border-white/10 py-3 outline-none">
            </div>
            <div id="shiftList" class="space-y-3"></div>
        </section>

    </main>

    <nav class="fixed bottom-8 left-6 right-6 glass-card p-2 flex justify-around items-center shadow-2xl z-50">
        <button onclick="switchPage('page-home', this)" class="p-4 active"><i class="fa-solid fa-house"></i></button>
        <button onclick="switchPage('page-calendar', this)" class="p-4 text-zinc-500"><i class="fa-solid fa-calendar-alt"></i></button>
        <button onclick="switchPage('page-settings', this)" class="p-4 text-zinc-500"><i class="fa-solid fa-sliders"></i></button>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA11zPbXEFs-sdIHKaxhkprkoGSGP1whfg",
            authDomain: "ims-fei.firebaseapp.com",
            databaseURL: "https://ims-fei-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ims-fei",
            storageBucket: "ims-fei.firebasestorage.app",
            messagingSenderId: "791711191329",
            appId: "1:791711191329:web:0a4ba03cd5f11eb71bae60"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const TH_DAYS = ['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์'];
        const TH_MONTHS = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
        
        let logs = [];
        let viewDate = new Date();
        let selectedDate = null;
        let config = JSON.parse(localStorage.getItem('cf_p2')) || { salary: 15000, shifts: {} };

        db.ref('attendance').on('value', snap => {
            const data = snap.val();
            logs = data ? Object.keys(data).map(id => ({ id, ...data[id] })) : [];
            renderAll();
        });

        // --- Daily Plan Editor (The New Logic) ---
        async function editDailyPlan() {
            if (!selectedDate) return;
            const log = logs.find(l => l.date === selectedDate);
            if (!log) return Swal.fire({ title: 'ไม่มีข้อมูล', text: 'ต้อง Check In ก่อนถึงจะแก้กะของวันนี้ได้ครับ', icon: 'info', background: '#1c1c1e', color: '#fff' });

            const { value: form } = await Swal.fire({
                title: 'ปรับกะงานเฉพาะกิจ',
                html: `
                    <div class="text-left space-y-4 p-2">
                        <p class="text-[10px] opacity-40 uppercase">วันที่: ${selectedDate}</p>
                        <div><label class="text-xs opacity-50">แผนเข้างาน (Plan In)</label><input id="pIn" type="time" class="w-full bg-zinc-800 p-3 rounded-xl mt-1" value="${log.planIn || '08:30'}"></div>
                        <div><label class="text-xs opacity-50">แผนออกงาน (Plan Out)</label><input id="pOut" type="time" class="w-full bg-zinc-800 p-3 rounded-xl mt-1" value="${log.planOut || '17:30'}"></div>
                    </div>`,
                showCancelButton: true,
                confirmButtonText: 'อัปเดตแผนกะ',
                preConfirm: () => [document.getElementById('pIn').value, document.getElementById('pOut').value],
                background: '#1c1c1e', color: '#fff', confirmButtonColor: '#007AFF'
            });

            if (form) {
                const [newPIn, newPOut] = form;
                const late = diffMins(newPIn, log.checkIn);
                const ot = log.checkOut ? Math.max(0, Math.floor(diffMins(newPOut, log.checkOut) / 60)) : 0;
                
                db.ref('attendance/' + log.id).update({
                    planIn: newPIn, planOut: newPOut,
                    late: late > 0 ? late : 0, ot: ot
                });
                toast("ปรับปรุงกะงานของวันนี้แล้ว");
            }
        }

        // --- Core Functions ---
        function checkIn() {
            const now = new Date(), date = now.toISOString().split('T')[0], time = now.toTimeString().slice(0, 5);
            if (logs.find(l => l.date === date)) return toast("วันนี้ลงชื่อไปแล้วครับ", "info");
            
            const dayName = TH_DAYS[now.getDay()];
            const pIn = config.shifts[dayName]?.in || "08:30";
            const late = diffMins(pIn, time);

            db.ref('attendance').push({
                date, checkIn: time, checkOut: "", 
                late: late > 0 ? late : 0, ot: 0,
                planIn: pIn, planOut: config.shifts[dayName]?.out || "17:30"
            });
            toast("ลงเวลาเข้างานเรียบร้อยแล้ว");
        }

        function checkOut() {
            const now = new Date(), date = now.toISOString().split('T')[0], time = now.toTimeString().slice(0, 5);
            const today = logs.find(l => l.date === date);
            if (!today) return toast("ยังไม่ได้เข้างาน!", "error");
            
            const otMin = diffMins(today.planOut || "17:30", time);
            db.ref('attendance/' + today.id).update({
                checkOut: time,
                ot: otMin > 60 ? Math.floor(otMin / 60) : 0
            });
            toast("ลงเวลาเลิกงานเรียบร้อยแล้ว");
        }

        // --- UI Logic ---
        function renderAll() {
            // Salary
            const currentM = new Date().toISOString().slice(0, 7);
            const mData = logs.filter(l => l.date.startsWith(currentM));
            const totalOT = mData.reduce((s, l) => s + (l.ot || 0), 0);
            const otPay = totalOT * ((config.salary / 30 / 8) * 1.5);
            const net = (parseFloat(config.salary) + otPay) - Math.min(config.salary * 0.05, 750);
            document.getElementById('salaryDisplay').innerText = net.toLocaleString(undefined, { minimumFractionDigits: 2 });

            // Calendar
            const year = viewDate.getFullYear(), month = viewDate.getMonth();
            document.getElementById('monthDisplay').innerText = `${TH_MONTHS[month]} ${year + 543}`;
            const first = new Date(year, month, 1).getDay(), days = new Date(year, month+1, 0).getDate();
            const container = document.getElementById('calendarDays');
            container.innerHTML = '';
            for(let i=0; i<first; i++) container.innerHTML += '<div></div>';
            for(let d=1; d<=days; d++) {
                const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const log = logs.find(l => l.date === dStr);
                const status = log ? (log.late > 0 ? 'status-late' : 'status-normal') : '';
                const today = new Date().toISOString().split('T')[0] === dStr ? 'day-today' : '';
                container.innerHTML += `<div onclick="selectDay('${dStr}')" class="day-node ${status} ${today} btn-press">${d}</div>`;
            }
        }

        function selectDay(date) {
            selectedDate = date;
            const log = logs.find(l => l.date === date);
            const panel = document.getElementById('dayDetail');
            panel.classList.remove('hidden');
            document.getElementById('detailDate').innerText = date;
            document.getElementById('detailIn').innerText = log ? log.checkIn : '-';
            document.getElementById('detailOut').innerText = log ? (log.checkOut || 'ยังไม่ออก') : '-';
        }

        function changeMonth(s) { viewDate.setMonth(viewDate.getMonth() + s); renderAll(); }
        function switchPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('nav button').forEach(b => b.classList.replace('text-blue-500', 'text-zinc-500'));
            btn.classList.replace('text-zinc-500', 'text-blue-500');
        }

        function diffMins(t1, t2) {
            const [h1, m1] = t1.split(':').map(Number), [h2, m2] = t2.split(':').map(Number);
            return (h2 * 60 + m2) - (h1 * 60 + m1);
        }

        function saveConfig() {
            config.salary = document.getElementById('baseSalary').value;
            localStorage.setItem('cf_p2', JSON.stringify(config));
            renderAll();
        }

        function saveShift(day, type, val) {
            if(!config.shifts[day]) config.shifts[day] = {};
            config.shifts[day][type] = val;
            localStorage.setItem('cf_p2', JSON.stringify(config));
        }

        function toast(m, i="success") { Swal.fire({ title: m, icon: i, timer: 1500, showConfirmButton: false, background: '#1c1c1e', color: '#fff' }); }

        window.onload = () => {
            document.getElementById('baseSalary').value = config.salary;
            document.getElementById('shiftList').innerHTML = TH_DAYS.map(d => `
                <div class="glass-card p-4 flex justify-between items-center text-sm">
                    <span class="font-bold">${d}</span>
                    <div class="flex gap-2">
                        <input type="time" class="font-bold text-blue-400" value="${config.shifts[d]?.in || '08:30'}" onchange="saveShift('${d}', 'in', this.value)">
                        <input type="time" class="font-bold text-blue-400" value="${config.shifts[d]?.out || '17:30'}" onchange="saveShift('${d}', 'out', this.value)">
                    </div>
                </div>`).join('');
            renderAll();
        };
    </script>
</body>
</html>
